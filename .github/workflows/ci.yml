name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Build
        run: swift build -c release

      - name: Run Tests
        run: swift test

  lint:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Check for build warnings as errors
        run: |
          swift build 2>&1 | tee build-output.txt
          # Fail if there are any errors (warnings are ok for now)
          if grep -q "error:" build-output.txt; then
            echo "Build has errors!"
            exit 1
          fi
