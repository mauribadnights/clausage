name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Run Tests
        run: swift test

      - name: Build Release
        run: bash build.sh

      - name: Create zip archive
        run: zip -r Clausage.app.zip Clausage.app

      - name: Extract tag changelog
        id: changelog
        run: |
          # Get the tag message (which contains the changelog from release.sh)
          TAG_MSG=$(git tag -l --format='%(contents)' "${GITHUB_REF_NAME}")
          # Fall back to auto-generated notes if tag has no message
          if [ -z "$TAG_MSG" ]; then
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_notes=true" >> "$GITHUB_OUTPUT"
            # Write to file to preserve newlines
            echo "$TAG_MSG" > /tmp/release-notes.md
          fi

      - name: Create GitHub Release (with tag notes)
        if: steps.changelog.outputs.has_notes == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: Clausage.app.zip
          body_path: /tmp/release-notes.md
          draft: false
          prerelease: false

      - name: Create GitHub Release (auto-generated notes)
        if: steps.changelog.outputs.has_notes != 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: Clausage.app.zip
          generate_release_notes: true
          draft: false
          prerelease: false
