name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Run Tests
        run: swift test

      - name: Build Release
        run: bash build.sh

      - name: Create zip archive
        run: zip -r Clausage.app.zip Clausage.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Clausage.app.zip
          generate_release_notes: true
          draft: false
          prerelease: false
